name: tests
on:
  push:
    paths-ignore:
      - "*.yml"
      - .gitignore
      - "*.md"
  pull_request:
    paths-ignore:
      - "*.yml"
      - .gitignore
      - "*.md"

env:
  deps: python3-dev libglib2.0-0 libsm6 libxext6 libxrender-dev libgl1-mesa-glx tree
  DEBIAN_FRONTEND: noninteractive

jobs:
  validate:
    name: ${{ matrix.name }} ${{ matrix.enc }} 
    runs-on: ubuntu-latest
    container: registry.gitlab.com/luigi311/encoders-docker:latest
    strategy:
      fail-fast: false
      matrix:
        enc: [aom, rav1e, svt_av1, vpx, x265, x264]
        name: [baseline, target_quality]
        include:
          - name: baseline
            flags: ""
          - name: target_quality
            flags: --target-quality 95
          - name: chunk-hybrid
            enc: aom
            flags: --chunk-method hybrid
          - name: chunk-select
            enc: aom
            flags: --chunk-method select
          - name: scenes
            enc: aom
            flags: -s scenes.json
          - name: workers
            enc: aom
            flags: -w 2
          - name: vmaf
            enc: aom
            flags: --vmaf
          - name: vmaf-plots
            enc: aom
            flags: --vmaf-plots
          - name: extra-splits
            enc: aom
            flags: -xs 10
          - name: split-aom-keyframes
            enc: aom
            flags: --split-method aom_keyframes
          - name: video_settings
            enc: aom
            flags: -v " --cpu-used=3 --end-usage=q --cq-level=30 --threads=8 "
          - name: temp
            enc: aom
            flags: --temp temporary
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.7'
      - name: Validate encoders
        run: |
          aomenc --help
          SvtAv1EncApp --help
          rav1e --help
          x265 --help || true
      - name: Install requirements
        run: |
          apt-get update && apt-get install -y ${{ env.deps }}
          python -m pip install --no-cache-dir -r requirements.txt
      - name: Download videos
        run: |
          for url in raw.githubusercontent.com/OpenVisualCloud/SVT-AV1-Resources/master randomderp.com; do
            curl -LO https://$url/video.tar.gz && break
          done
          tar xf video.tar.gz
      - name: Testing ${{ matrix.name }}
        run: |
          python ./av1an.py -i bus_cif.y4m -e ${{ matrix.enc }} -tr 20 --keep -o "bus_cif.mkv" ${{ matrix.flags }}
          du -h bus_cif.mkv
          tree -a

